name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Ensure app directory
        run: mkdir -p /Users/bini/apps/03_voxie

      - name: Sync repository
        shell: bash
        run: |
          if [ ! -d "/Users/bini/apps/03_voxie/.git" ]; then
            git clone https://github.com/miku-agent/03_voxie.git /Users/bini/apps/03_voxie
          fi
          cd /Users/bini/apps/03_voxie
          git fetch --all
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install deps
        working-directory: /Users/bini/apps/03_voxie
        run: pnpm install --frozen-lockfile

      - name: Verify deployment env
        working-directory: /Users/bini/apps/03_voxie
        shell: bash
        run: |
          if [ ! -f ".env.local" ]; then
            echo "Missing deployment env: /Users/bini/apps/03_voxie/.env.local"
            echo "Create .env.local with SUPABASE_URL and SUPABASE_ANON_KEY before deploying."
            exit 1
          fi

      - name: Build
        working-directory: /Users/bini/apps/03_voxie
        run: pnpm build

      - name: Restart app with PM2
        working-directory: /Users/bini/apps/03_voxie
        shell: bash
        run: |
          if pm2 describe 03_voxie > /dev/null; then
            pm2 delete 03_voxie
          fi
          pm2 start "pnpm start -p 23200" --name 03_voxie
          pm2 save
